<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Horario Electrónica 2026-1</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="modal-overlay" id="overlay" onclick="closeModal()"></div>
    <div class="custom-modal" id="infoModal">
        <span class="close-btn" onclick="closeModal()">×</span>
        <div id="modalBody"></div>
    </div>

    <div class="container">
        <h1>Horario Electrónica B5</h1>
        <p class="subtitle" id="liveClock">Cargando hora...</p>

        <div class="legend-container" id="legend"></div>

        <button class="filter-toggle-btn" id="toggleFiltersBtn" onclick="toggleFilters()">
            <span>🔍</span> Filtrar Horario
        </button>

        <div class="filter-section collapsed" id="filterSection">
            <div class="filter-group">
                <label for="filterMateria">Materia</label>
                <select id="filterMateria" multiple>
                    <option value="all" selected>Todas</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="filterDocente">Profesor</label>
                <select id="filterDocente" multiple>
                    <option value="all" selected>Todos</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="filterLab">Laboratorista</label>
                <select id="filterLab" multiple>
                    <option value="all" selected>Todos</option>
                </select>
            </div>
            <button class="btn-clear" onclick="clearFilters()">Limpiar</button>
            <p class="filter-hint">Mantén presionado <b>Ctrl</b> (o Cmd) para seleccionar varios</p>
        </div>

        <div class="table-wrapper">
            <table id="scheduleTable">
                <thead>
                    <tr>
                        <th class="hour-col">HR</th>
                        <th>L</th>
                        <th>M</th>
                        <th>X</th>
                        <th>J</th>
                        <th>V</th>
                        <th>S</th>
                    </tr>
                </thead>
                <tbody id="scheduleBody"></tbody>
            </table>
        </div>
    </div>

    <script src="constants.js"></script>
    <script src="script.js"></script>
</body>

</html>
